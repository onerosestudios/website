<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>One Rose Studios</title>

  <style>
    body {
      margin: 0;
      background-color: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
      display: flex;
      justify-content: center;
      padding: 60px 20px;
    }

    .container {
      max-width: 500px;
      width: 100%;
      text-align: center;
    }

    /* Logo */
    .logo img {
      width: 140px;
      margin-bottom: 40px;
    }

    /* Headings */
    h1 {
      font-size: 26px;
      margin-bottom: 20px;
      font-weight: 600;
    }

    h2 {
      font-size: 20px;
      margin-top: 12px;
      font-weight: 500;
    }

    /* Sections */
    .section {
      margin-top: 50px;
    }

    /* App icon */
    .app-icon {
      width: 90px;
      border-radius: 20px;
    }

    /* Contact */
    a {
      color: #aaa;
      text-decoration: none;
      font-size: 16px;
    }

    a:hover {
      color: #fff;
      text-decoration: underline;
    }
  </style>
</head>

<body>
  <div class="container">

    <!-- Logo -->
    <div class="logo">
      <img src="logo.png" alt="One Rose Studios Logo">
    </div>

    <!-- Apps -->
    <div class="section">
      <h1>Apps</h1>

      <img src="icon.png" alt="Lumen App Icon" class="app-icon">
      <h2>Lumen</h2>
    </div>

    <!-- Contact -->
    <div class="section">
      <h1>Contact Us</h1>
      <p>
        <a href="mailto:support@onerosestudios.com">
          support@onerosestudios.com
        </a>
      </p>
    </div>

  </div>
</body>
</html>
