<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>One Rose Studios</title>

  <style>
    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
      text-align: center;
      padding: 40px 20px;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
    }

    img {
      max-width: 120px;
      height: auto;
    }

    .logo {
      margin-bottom: 30px;
    }

    h1 {
      font-size: 28px;
      margin: 10px 0;
    }

    h2 {
      font-size: 22px;
      margin: 20px 0 10px;
    }

    .section {
      margin-top: 40px;
    }

    a {
      color: #ccc;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">

    <!-- Logo -->
    <div class="logo">
      <img src="logo.png" alt="Logo">
    </div>

    <!-- Apps Section -->
    <div class="section">
      <h1>Apps</h1>

      <img src="app-icon.png" alt="App Icon">
      <h2>Lumen</h2>
    </div>

    <!-- Contact -->
    <div class="section">
      <h1>Contact Us</h1>
      <p>
        <a href="mailto:your@email.com">your@email.com</a>
      </p>
    </div>

  </div>
</body>
</html>
